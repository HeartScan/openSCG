openapi: 3.0.3
info:
  title: OpenSCG API
  description: |-
    The public API for the OpenSCG real-time signal acquisition and streaming service.
    
    This monolith application (Next.js) provides endpoints for session management.
    Real-time communication is handled via a WebSocket connection (socket.io) on the same host.
  version: 1.0.0
servers:
  - url: / # Relative to the host
paths:
  /api/auth/device:
    post:
      tags:
        - Auth
      summary: Authenticate device
      description: >-
        Generates a secure, random device code and sets it as an HttpOnly cookie.
        This must be called before creating a session.
      operationId: auth_device
      responses:
        '200':
          description: Device authenticated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceCode:
                    type: string
                    example: "dc_..."

  /api/sessions:
    post:
      tags:
        - Session
      summary: Create a new session
      description: >-
        Initializes a new measurement session and returns the necessary details
        to connect a patient client and viewers.
      operationId: create_session
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/sessions/{sessionId}/data:
    get:
      tags:
        - Session
      summary: Get session raw data
      description: >-
        Retrieves the complete raw accelerometer data for a completed session.
      operationId: get_session_data
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Successful retrieval of session data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullSession'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Session
      summary: Upload session raw data
      description: >-
        Uploads the full session dataset from client storage to the server for persistence.
      operationId: upload_session_data
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullSession'
      responses:
        '200':
          description: Data uploaded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

components:
  schemas:
    Session:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
          description: The unique identifier for the session.
        createdAt:
          type: string
          format: date-time
        viewerUrl:
          type: string
          description: The URL path for the web-based viewer.
          example: /view/a7b1c3d5...

    FullSession:
      type: object
      description: The complete session object as defined in openscg-format.md
      properties:
        version:
          type: string
        sessionId:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        samplingRateHz:
          type: number
        samples:
          type: array
          description: List of optimized data tuples [timestamp_ms, ax, ay, az]
          items:
            $ref: '#/components/schemas/Sample'

    Sample:
      type: array
      description: Optimized data tuple [timestamp_ms, ax, ay, az]
      minItems: 4
      maxItems: 4
      items:
        type: number

    Error:
      type: object
      properties:
        error:
          type: string
          description: A human-readable description of the error.
      required:
        - error

  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      description: The UUID of the session.
      schema:
        type: string
        format: uuid
