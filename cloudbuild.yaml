steps:
  # Build the Docker image for Frontend
  # We use openscg_app as the context for docker build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/openscg-app:latest'
      - 'openscg_app/'
    id: 'Build-Frontend'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/openscg-app:latest'
    id: 'Push-Frontend'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'openscg-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/openscg-app:latest'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      # Next.js 15 might need more memory during cold starts
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
    id: 'Deploy-Frontend'

images:
  - 'gcr.io/$PROJECT_ID/openscg-app:latest'
